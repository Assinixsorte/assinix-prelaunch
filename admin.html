<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin — Assinix</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial, sans-serif;
  padding:20px;
}

h1{margin-bottom:20px;}
.section{margin-bottom:40px;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  border:1px solid #1e293b;
  padding:10px;
}

th{background:#1e293b;}
tr:hover{background:#1e293b;}

button{
  padding:10px 15px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

#loginBox{
  max-width:300px;
  margin:auto;
  margin-top:100px;
  text-align:center;
}

#loginBox input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="loginBox">
  <h2>🔒 Acesso Admin</h2>
  <input type="password" id="password" placeholder="Digite a senha">
  <button onclick="login()">Entrar</button>
  <p id="error" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">

<h1>📊 Dashboard Assinix</h1>

<!-- LEADS -->
<div class="section">
  <h2>👤 Leads</h2>
  <button onclick="loadLeads()">Atualizar</button>
  <table id="leadsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Social</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- WHATSAPP -->
<div class="section">
  <h2>📱 WhatsApp</h2>
  <button onclick="loadWhats()">Atualizar</button>
  <table id="whatsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Número</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>

<script>
let ADMIN_PASSWORD = '';

// ===== LOGIN =====
function login(){
  const input = document.getElementById('password').value.trim();

  if(!input){
    document.getElementById('error').textContent = 'Digite a senha';
    return;
  }

  ADMIN_PASSWORD = input;

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  loadLeads();
  loadWhats();
}

// ===== FUNÇÃO PARA CARREGAR LEADS =====
async function loadLeads(){
  try{
    const res = await fetch('/api/leads',{
      headers:{'x-admin-password': ADMIN_PASSWORD}
    });

    if(res.status === 401){
      alert('Senha inválida');
      location.reload();
      return;
    }

    const data = await res.json();
    const tbody = document.querySelector('#leadsTable tbody');
    tbody.innerHTML = '';

    data.forEach(l => {
      tbody.innerHTML += `
        <tr>
          <td>${l.id}</td>
          <td>${l.nome}</td>
          <td>${l.email}</td>
          <td>${l.social}</td>
          <td>${l.created_at || ''}</td>
        </tr>
      `;
    });

  } catch(err){
    console.error(err);
    alert('Erro ao buscar leads');
  }
}

// ===== FUNÇÃO PARA CARREGAR WHATSAPP =====
async function loadWhats(){
  try{
    const res = await fetch('/api/whatsapp',{
      headers:{'x-admin-password': ADMIN_PASSWORD}
    });

    if(res.status === 401){
      alert('Senha inválida');
      location.reload();
      return;
    }

    const data = await res.json();
    const tbody = document.querySelector('#whatsTable tbody');
    tbody.innerHTML = '';

    data.forEach(w => {
      tbody.innerHTML += `
        <tr>
          <td>${w.id}</td>
          <td>${w.phone}</td>
          <td>${w.created_at || ''}</td>
        </tr>
      `;
    });

  } catch(err){
    console.error(err);
    alert('Erro ao buscar números');
  }
}
</script>

</body>
</html>
